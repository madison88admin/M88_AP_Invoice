[build]
  command = "pnpm build --filter @ap-invoice/web"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/api/invoices/upload*"
  to = "http://5.223.78.194/api/invoices/upload:splat"
  status = 200
  force = true
  [redirects.headers]
    X-Netlify-Timeout = "300"

[[redirects]]
  from = "/api/*"
  to = "http://5.223.78.194/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/health/*"
  to = "http://5.223.78.194/health/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
