[build]
  base = "/"
  command = "pnpm install --frozen-lockfile && pnpm build --filter @ap-invoice/web"
  publish = "apps/web/dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--version"

[[redirects]]
  from = "/api/*"
  to = "http://5.223.78.194/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/health/*"
  to = "http://5.223.78.194/health/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache dependencies for faster builds
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"